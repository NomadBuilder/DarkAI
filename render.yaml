services:
  - type: web
    name: darkai-consolidated
    env: python
    buildCommand: |
      set -x  # Print commands as they execute (but don't exit on error)
      
      echo "=========================================="
      echo "🚀 Starting build process"
      echo "=========================================="
      echo "Current directory: $(pwd)"
      echo "Directory contents:"
      ls -la | head -15
      
      echo ""
      echo "📦 Installing Python dependencies..."
      pip install --disable-pip-version-check --upgrade pip && pip install --disable-pip-version-check -r requirements.txt || echo "⚠️  Python install had issues, but continuing..."
      
      echo ""
      echo "=========================================="
      echo "📦 Building Ledger"
      echo "=========================================="
      echo "Checking for ledger directory..."
      ls -la | grep ledger || echo "⚠️  ledger not found in listing"
      
      # Build ledger - ensure Node.js is available
      if [ -d "ledger" ]; then
        echo "✅ ledger/ directory found!"
        echo "Current directory: $(pwd)"
        echo "Ledger directory contents:"
        ls -la ledger/ | head -10
        
        # Find and use Node.js
        if [ -n "$NODE_VERSION" ]; then
          NODE_DIR="/opt/render/project/nodes/node-$NODE_VERSION"
          echo "Using NODE_VERSION: $NODE_VERSION"
        else
          NODE_DIR=$(ls -d /opt/render/project/nodes/node-* 2>/dev/null | head -1)
          echo "Auto-detecting Node.js..."
        fi
        
        if [ -d "$NODE_DIR" ] && [ -f "$NODE_DIR/bin/node" ]; then
          echo "✅ Found Node.js at: $NODE_DIR"
          export PATH="$NODE_DIR/bin:$PATH"
        else
          echo "❌ ERROR: Node.js not found at $NODE_DIR"
          echo "Please set NODE_VERSION=22.16.0 in Render dashboard"
          exit 1
        fi
        
        echo "✅ Node.js: $(node --version)"
        echo "✅ npm: $(npm --version)"
        echo "✅ Node path: $(which node)"
        
        # Build ledger
        cd ledger || { echo "❌ Failed to cd into ledger"; exit 1; }
        echo ""
        echo "📁 In ledger directory: $(pwd)"
        echo "📄 Checking critical files:"
        test -f "package.json" && echo "  ✅ package.json" || echo "  ❌ package.json missing"
        test -f "tsconfig.json" && echo "  ✅ tsconfig.json" || echo "  ❌ tsconfig.json missing"
        test -f "next.config.js" && echo "  ✅ next.config.js" || echo "  ❌ next.config.js missing"
        test -f "app/layout.tsx" && echo "  ✅ app/layout.tsx" || echo "  ❌ app/layout.tsx missing"
        test -f "components/ErrorBoundary.tsx" && echo "  ✅ components/ErrorBoundary.tsx" || echo "  ❌ components/ErrorBoundary.tsx missing"
        test -f "components/ScrollyContainer.tsx" && echo "  ✅ components/ScrollyContainer.tsx" || echo "  ❌ components/ScrollyContainer.tsx missing"
        test -f "postcss.config.js" && echo "  ✅ postcss.config.js" || echo "  ❌ postcss.config.js missing"
        test -f "tailwind.config.js" && echo "  ✅ tailwind.config.js" || echo "  ❌ tailwind.config.js missing"
        
        echo ""
        echo "📄 Verifying postcss.config.js format:"
        cat postcss.config.js | head -5
        
        echo ""
        echo "🧹 Clearing build cache (like working commit)..."
        rm -rf .next out
        # Clear everything like the working commit did
        
        echo ""
        echo "📦 Running npm install..."
        # Install all dependencies (devDependencies included by default; --include=dev can cause install to fail on some npm versions)
        npm install || { 
          echo "❌ npm install failed with exit code $?"
          exit 1
        }
        
        # Verify critical dependencies are installed
        echo ""
        echo "🔍 Verifying critical dependencies..."
        npm list typescript tailwindcss postcss autoprefixer 2>&1 | grep -E "(typescript|tailwindcss|postcss|autoprefixer|missing|extraneous)" || echo "✅ All critical dependencies found"
        
        echo ""
        echo "🔨 Running build (build:protectont = root-relative for ProtectOnt.ca)..."
        echo "Environment: NODE_ENV=production, no BASE_PATH (for protectont.ca at root)"
        
        # Create diagnostic log file
        DIAG_LOG="/tmp/ledger-build-diagnostic.log"
        echo "=== Ledger Build Diagnostic ===" > "$DIAG_LOG"
        echo "Timestamp: $(date)" >> "$DIAG_LOG"
        echo "Working directory: $(pwd)" >> "$DIAG_LOG"
        echo "Node.js: $(node --version 2>&1)" >> "$DIAG_LOG"
        echo "npm: $(npm --version 2>&1)" >> "$DIAG_LOG"
        echo "Environment vars:" >> "$DIAG_LOG"
        echo "  NODE_ENV=$NODE_ENV" >> "$DIAG_LOG"
        echo "Build: npm run build:protectont (static export, no base path)" >> "$DIAG_LOG"
        
        # Give Next.js enough memory on Render (default can be too low)
        export NODE_OPTIONS="${NODE_OPTIONS:-} --max-old-space-size=4096"
        
        echo ""
        echo "📝 protectont-config.json (get-involved submit URL for static export)..."
        SUBMIT_URL="${NEXT_PUBLIC_GET_INVOLVED_SUBMIT_URL:-${GET_INVOLVED_SUBMIT_URL:-}}"
        if [ -n "$SUBMIT_URL" ]; then
          node -e "const fs=require('fs');const u=(process.env.NEXT_PUBLIC_GET_INVOLVED_SUBMIT_URL||process.env.GET_INVOLVED_SUBMIT_URL||'').trim();fs.writeFileSync('public/protectont-config.json',JSON.stringify({getInvolvedSubmitUrl:u,submitViaApi:true}));"
          echo "  ✅ Wrote public/protectont-config.json"
        else
          echo "  ⚠️  NEXT_PUBLIC_GET_INVOLVED_SUBMIT_URL not set — form needs /api/protectont-config or rebuild after setting env"
        fi
        
        # Social preview image (1200x630 PNG; SVG is not supported by Facebook/iMessage)
        if command -v python3 >/dev/null 2>&1; then
          python3 scripts/generate-og-image.py >> "$DIAG_LOG" 2>&1 || echo "  ⚠️  og-image.png generation skipped (commit ledger/public/og-image.png)" >> "$DIAG_LOG"
        fi

        # Wipe prior export AND Next cache so label/source edits always recompile
        rm -rf .next out
        # Run build with environment variables inline (more reliable) and capture all output
        # Explicitly clear BASE_PATH — Render service env may still set BASE_PATH=/ledger
        # for darkai.ca subpath hosting; ProtectOnt must be root-relative or CSS 404s.
        if ! env -u BASE_PATH -u NEXT_PUBLIC_BASE_PATH \
            NODE_ENV=production \
            STATIC_EXPORT=true \
            BASE_PATH= \
            NEXT_PUBLIC_BASE_PATH= \
            NEXT_PUBLIC_SITE_URL="${NEXT_PUBLIC_SITE_URL:-https://protectont.ca}" \
            npm run build:protectont >> "$DIAG_LOG" 2>&1; then
          echo ""
          echo "❌ Build failed with exit code $?"
          echo "Current directory: $(pwd)"
          echo "Checking for errors..."
          echo "Full diagnostic log saved to: $DIAG_LOG"
          echo "Last 50 lines of diagnostic log:"
          tail -50 "$DIAG_LOG"
          exit 1
        fi
        if grep -qE 'href="/ledger/_next|src="/ledger/_next' out/index.html; then
          echo "❌ ProtectOnt build incorrectly used BASE_PATH=/ledger (asset URLs are /ledger/_next/...)"
          echo "   Unset BASE_PATH / NEXT_PUBLIC_BASE_PATH for this build and retry."
          exit 1
        fi
        echo "✅ Asset URLs are root-relative (no /ledger/_next prefix)"
        
        # Add post-build diagnostics
        echo "" >> "$DIAG_LOG"
        echo "=== Post-Build Check ===" >> "$DIAG_LOG"
        echo "out/ exists: $([ -d "out" ] && echo "YES" || echo "NO")" >> "$DIAG_LOG"
        echo "out/index.html exists: $([ -f "out/index.html" ] && echo "YES" || echo "NO")" >> "$DIAG_LOG"
        if [ -d "out" ]; then
          echo "out/ contents:" >> "$DIAG_LOG"
          ls -la out/ >> "$DIAG_LOG" 2>&1
        fi
        echo "Diagnostic log saved to: $DIAG_LOG"
        
        echo ""
        echo "✅ Build command completed"
        echo "Current directory: $(pwd)"
        echo "Waiting 2 seconds for file system to sync..."
        sleep 2
        echo "Checking for out/ directory..."
        if [ -d "out" ]; then
          echo "✅ out/ directory exists"
          ls -la out/ | head -10
          echo "Checking for index.html..."
          if [ -f "out/index.html" ]; then
            echo "✅ out/index.html exists"
            echo "File size: $(ls -lh out/index.html | awk '{print $5}')"
          else
            echo "❌ out/index.html NOT found"
            echo "Contents of out/:"
            ls -la out/ | head -10
          fi
        else
          echo "❌ out/ directory NOT found in $(pwd)"
          echo "Current directory contents:"
          ls -la | head -15
          echo "Checking if build actually ran..."
          if [ -d ".next" ]; then
            echo "⚠️  .next/ exists but out/ doesn't - static export may have failed"
            echo "Checking next.config.js output setting..."
            node -e "process.env.NODE_ENV='production'; process.env.STATIC_EXPORT='true'; const config = require('./next.config.js'); console.log('output:', config.output || 'NOT SET');"
          fi
        fi
        
        # Verify from within ledger directory first
        if [ ! -d "out" ] || [ ! -f "out/index.html" ]; then
          echo "❌ ERROR: Build output verification failed in ledger directory"
          echo "Current directory: $(pwd)"
          echo "out/ exists: $([ -d "out" ] && echo "YES" || echo "NO")"
          echo "out/index.html exists: $([ -f "out/index.html" ] && echo "YES" || echo "NO")"
          if [ -d ".next" ]; then
            echo "⚠️  .next/ exists - build may have run but static export failed"
            echo "Checking next.config.js output setting..."
            node -e "process.env.NODE_ENV='production'; process.env.STATIC_EXPORT='true'; const config = require('./next.config.js'); console.log('output:', config.output || 'NOT SET'); console.log('basePath:', config.basePath || 'NOT SET');"
          fi
          exit 1
        fi
        
        echo "✅ Build output verified in ledger directory"
        echo "out/index.html size: $(ls -lh out/index.html | awk '{print $5}')"
        
        cd ..
        
        echo ""
        echo "✅ Verifying build output from parent directory..."
        echo "Current directory: $(pwd)"
        if [ ! -d "ledger/out" ]; then
          echo "❌ ERROR: ledger/out/ directory not found from parent directory"
          echo "This suggests a path or permission issue"
          echo "Contents of ledger/:"
          ls -la ledger/ | head -15
          exit 1
        fi
        if [ ! -f "ledger/out/index.html" ]; then
          echo "❌ ERROR: ledger/out/index.html not found from parent directory"
          echo "Contents of ledger/out/:"
          ls -la ledger/out/ | head -10
          exit 1
        fi
        echo "✅ ledger/out/index.html exists and is accessible"
        echo "✅ Absolute path (app.py expects ledger/out under project root):"
        echo "   $(pwd)/ledger/out"
        ls -la ledger/out/ | head -10
        echo ""
        echo "📋 Copying ledger/out to static/protectont (full replace — avoids stale flat *.html shadowing */index.html)"
        rm -rf static/protectont
        mkdir -p static/protectont
        cp -r ledger/out/* static/protectont/
        # Keep accountability brief available even if Next export omitted public/reports
        # Report body asset (iframe) + ensure Next page owns /reports/they-called-it-protection
        if [ -f "ledger/public/report-assets/they-called-it-protection.html" ]; then
          mkdir -p static/protectont/report-assets
          cp -f ledger/public/report-assets/they-called-it-protection.html static/protectont/report-assets/
          echo "✅ Copied report-assets/they-called-it-protection.html"
        fi
        # No stale flat report HTML under reports/ (App Router page must win)
        rm -f static/protectont/reports/they-called-it-protection.html
        echo "✅ static/protectont populated (app.py will serve from here if present)"
        ls -la static/protectont/ | head -5
        ls -la static/protectont/reports/ 2>/dev/null | head -10 || true
        echo ""
        # We already cd'd to repo root — check ledger/out, not a non-existent ./out
        if ! grep -q '>Reports' ledger/out/index.html; then
          echo "❌ ledger/out/index.html missing Reports nav item — TopNavigation not in build"
          exit 1
        fi
        echo "✅ Homepage nav includes Reports"
        echo "=========================================="
        echo "✅ Ledger build successful!"
        echo "=========================================="
      else
        echo "❌ ERROR: ledger directory not found in $(pwd)"
        echo "Directory contents:"
        ls -la | head -10
        exit 1
      fi
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 22.16.0
        comment: "Node.js version for building the Ledger Next.js app"
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: SKIP_NEO4J
        value: "0"
        comment: "Neo4j is configured in Render dashboard (NEO4J_URI, NEO4J_USERNAME, NEO4J_PASSWORD)"
      
      # Shared Database - All services use the same database
      # Using the existing blackwire database
      - key: POSTGRES_HOST
        fromDatabase:
          name: blackwire
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: blackwire
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: blackwire
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: blackwire
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: blackwire
          property: database
      
      # All services (PersonaForge, BlackWire, ShadowStack) will use the same POSTGRES_* vars
      # They use different table names so there's no conflict
      
      # Neo4j - Set in Render dashboard (not in render.yaml for security)
      # Required: NEO4J_URI, NEO4J_USERNAME (or NEO4J_USER), NEO4J_PASSWORD
      # These are already configured in your Render environment variables
      
      # API Keys - set these manually in Render dashboard
      # PersonaForge API Keys
      - key: BUILTWITH_API_KEY
        sync: false
      - key: IPLOCATE_API_KEY
        sync: false
      - key: SHODAN_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      
      # BlackWire API Keys
      - key: IPAPI_KEY
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: NUMLOOKUP_API_KEY
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
      
      # Email Configuration (Contact Form)
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: onboarding@resend.dev
      - key: CONTACT_EMAIL
        value: aazirmun@gmail.com

databases:
  # Using existing blackwire database (shared by all services)
  # The blackwire database already exists in Render
  - name: blackwire
    databaseName: blackwire
    user: blackwire_user
    plan: free

